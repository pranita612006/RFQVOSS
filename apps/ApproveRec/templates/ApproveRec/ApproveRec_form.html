{% extends "layouts/base.html" %}

{% block content %}
<div class="container-fluid full-dashboard bg-white pb-5">
    <div class="d-flex justify-content-between align-items-center pt-2 px-2 border-bottom">
        <ul class="nav nav-tabs border-0 small">
            <li class="nav-item">
                <a class="nav-link active py-1 px-3 border" style="background-color: #e2ebf5;">BOM</a>
            </li>
            <li class="nav-item">
                <a class="nav-link py-1 px-3 border mx-1" style="background-color: #f8f9fa;">BOM New Part</a>
            </li>
            <li class="nav-item">
                <a class="nav-link py-1 px-3 border mr-1" style="background-color: #f8f9fa;">BOP</a>
            </li>
            <li class="nav-item">
                <a class="nav-link py-1 px-3 border" style="background-color: #f8f9fa;">RFQ</a>
            </li>
        </ul>
        <button class="btn btn-outline-secondary btn-sm px-3"><i class="fas fa-arrow-left"></i> <u>Back</u></button>
    </div>

    <div class="p-3" style="background-color: #f8f9fa;">
        <form method="post">
            {% csrf_token %}
            <div class="row align-items-center">
                <div class="col-md-4">
                    <div class="input-group input-group-sm mb-1">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-transparent border-0 font-weight-bold" style="width: 130px;">Customer ID :</span>
                        </div>
                        <select name="customer_id" class="form-control border-secondary"><option></option></select>
                    </div>
                    <div class="input-group input-group-sm">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-transparent border-0 font-weight-bold" style="width: 130px;">BOM Creation ID</span>
                        </div>
                        <select name="bom_creation_id" class="form-control border-secondary"><option></option></select>
                    </div>
                </div>

                <div class="col-md-5">
                    <div class="input-group input-group-sm mb-1">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-transparent border-0 font-weight-bold" style="width: 130px;">Item Creation Id</span>
                        </div>
                        <select name="item_creation_id" class="form-control border-secondary"><option></option></select>
                    </div>
                    <div class="input-group input-group-sm">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-transparent border-0 font-weight-bold" style="width: 130px;">Action Status</span>
                        </div>
                        <select name="action_status" class="form-control border-secondary">
                            <option>Sent for approval</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-2">
                    <button type="submit" class="btn btn-sm text-white px-3" style="background-color: #5b74a3;">
                        <i class="fas fa-print"></i> Submit
                    </button>
                </div>
            </div>
        </form>
    </div>

    <div class="border" style="min-height: 200px; background-color: #fff;"></div>

    <div class="table-responsive mt-3">
        <table class="table table-sm table-bordered mb-0 text-nowrap" style="font-size: 0.85rem;">
            <thead style="background-color: #212529; color: white;">
                <tr>
                    <th>Customer_ID <i class="fas fa-filter fa-xs ml-1"></i></th>
                    <th>ItemCreation_Id <i class="fas fa-filter fa-xs ml-1"></i></th>
                    <th>BOMCreation_Id <i class="fas fa-filter fa-xs ml-1"></i></th>
                    <th>Part_Status <i class="fas fa-filter fa-xs ml-1"></i></th>
                    <th>Entry_Type <i class="fas fa-filter fa-xs ml-1"></i></th>
                    <th>Table_Id <i class="fas fa-filter fa-xs ml-1"></i></th>
                    <th>Part_Number <i class="fas fa-filter fa-xs ml-1"></i></th>
                    <th>Description <i class="fas fa-filter fa-xs ml-1"></i></th>
                </tr>
            </thead>
            <tbody>
                <tr style="height: 200px;">
                    <td colspan="8" class="bg-light"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
