{% extends "layouts/base.html" %}
{% block content %}
<div class="container-fluid full-dashboard">
  <h2>Customer Creation</h2>

  <div class="card card-primary mt-3">
    <div class="card-header">
      <h3 class="card-title">Customer Information</h3>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="card-body">
        <!-- Customer ID -->
        <div class="form-group">
          <label for="customer_id">Customer ID</label>
          <select id="customer_id" name="customer_id" class="form-control">
            <option value="">Select ID</option>
            {% for id in customer_ids %}
              <option value="{{ id }}">{{ id }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Customer Name -->
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" class="form-control" placeholder="Enter customer name">
        </div>

        <!-- Search Name -->
        <div class="form-group">
          <label for="search_name">Search Name</label>
          <select id="search_name" name="search_name" class="form-control">
            <option value="">Select Search Name</option>
            {% for sname in search_names %}
              <option value="{{ sname }}">{{ sname }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="card-footer text-right">
        <button type="submit" class="btn btn-success">Submit</button>
      </div>
    </form>
  </div>
</div>
<script>
console.log("Script loaded");
document.addEventListener("DOMContentLoaded", function() {
    const customerSelect = document.getElementById("customer_id");
    customerSelect.addEventListener("change", function() {
        const selectedId = this.value;
        console.log("Customer ID changed:", selectedId);  // debug log

        if (selectedId) {
            fetch("{% url 'get_customer_info' %}", {
                method: "POST",
                headers: {
                    "X-CSRFToken": "{{ csrf_token }}",
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: "customer_id=" + encodeURIComponent(selectedId)
            })
            .then(response => response.json())
            .then(data => {
                console.log("Returned search_name:", data.search_name);

                if (data.name) {
                    document.getElementById("name").value = data.name;
                }
                if (data.search_name) {
                    const searchDropdown = document.getElementById("search_name");
                    const returnedValue = data.search_name.trim().toLowerCase();
                    for (let i = 0; i < searchDropdown.options.length; i++) {
                        const optionValue = searchDropdown.options[i].value.trim().toLowerCase();
                        console.log("Comparing option:", optionValue); // debug log
                        if (optionValue === returnedValue) {
                            searchDropdown.selectedIndex = i;
                            console.log("Match found at index:", i); // debug log
                            break;
                        }
                    }
                }
            });
        }
    });
});
</script>
{% endblock %}
