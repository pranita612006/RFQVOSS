{% extends "layouts/base.html" %}
{% load static %}
{% block extra_head %}
<link rel="stylesheet" href="{% static 'assets/scss/custom.scss' %}">
{% endblock %}
{% block content %}
<div class="container-fluid mt-4">
  <div class="card card-primary">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h3 class="card-title mb-0">Item Creation</h3>
      <button type="button" class="btn btn-outline-secondary" id="btn-back">Back</button>
    </div>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="card-body scrollable-form p-3">
      <div class="row gx-3">
          <!-- LEFT COLUMN -->
        <div class="col-md-4">
        
           <div class="form-group">
            <label>Customer ID</label>
            <input type="text" name="customer_id" id="customer_id" class="form-control" value="{{ selected_customer_id }}" readonly>           </div>
            

            <div class="form-group mb-2">
              <label for="lastEcnNo">Last ECN No</label>
              <input type="text" class="form-control" id="lastEcnNo" name="lastEcnNo">
            </div>

            <div class="form-group mb-2">
              <label for="customer_name">Customer Name</label>
              <input type="text" id="customer_name" name="customer_name" class="form-control" value="{{ selected_name }}" readonly>
            </div>

            <div class="form-group mb-2">
                <label for="s_item">Search Item</label>
                <select id="s_item" name="s_item" class="form-control">
                    <option value="">Select Item</option>
                    {% for item in s_item %}
                    <option value="{{ item }}">{{ item }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group mb-2">
              <label for="no">No</label>
              <input type="text" class="form-control" id="no" name="no">
            </div>

            <div class="form-group mb-2">
                <label for="templatename">Template Name</label>
                <select id="templatename" name="templatename" class="form-control">
                    <option value="">Select Template Name</option>
                    {% for t in template_name %}
                    <option value="{{ t }}">{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group mb-2">
              <label for="description">Description</label>
              <input type="text" class="form-control" id="description" name="description">
            </div>
<div class="form-group mb-2">
    <label for="base_unit_of_measure">Base Unit of Measure</label>
    <select id="base_unit_of_measure" name="base_unit_of_measure" class="form-control">
        <option value="">Select Unit</option>
        {% for u in uoms %}
            <option value="{{ u.code }}">{{ u.code }} - {{ u.description }}</option>
        {% endfor %}
    </select>
</div>

<div class="form-group mb-2">
    <label for="shelf_no">Shelf No</label>
    <!-- Use text if shelf numbers can include letters/codes -->
    <input type="text" class="form-control" id="shelf_no" name="shelf_no">
</div>

<div class="form-group mb-2">
    <label for="cell">Cell</label>
    <select id="cell" name="cell" class="form-control">
        <option value="">Select Cell</option>
        {% for c in cells %}
            <option value="{{ c.code }}">{{ c.code }}</option>
        {% endfor %}
    </select>
</div>

<div class="form-group mb-2">
    <label for="cell_type">Cell Type</label>
    <select id="cell_type" name="cell_type" class="form-control">
        <option value="">Select Cell Type</option>
        {% for ct in cell_types %}
            <option value="{{ ct.code }}">{{ ct.code }}</option>
        {% endfor %}
    </select>
</div>

<div class="form-group mb-2">
    <label for="item_category_code">Item Category Code</label>
    <select id="item_category_code" name="item_category_code" class="form-control">
        <option value="">Select Item Category</option>
        {% for c in item_categories %}
            <option value="{{ c.code }}">
                {{ c.code }} - {{ c.description }}
            </option>
        {% endfor %}
    </select>
</div>

<div class="form-group mb-2">
    <label for="product_group_code">Product Group Code</label>
    <select id="product_group_code" name="product_group_code" class="form-control">
        <option value="">Select Product Group</option>
        {% for p in product_groups %}
            <option value="{{ p.code }}">{{ p.code }}</option>
        {% endfor %}
    </select>
</div>
</div>

          <!-- MIDDLE COLUMN -->
          <div class="col-md-4">

<div class="form-group mb-2">
    <label for="status">Status</label>
    <select id="status" name="status" class="form-control">
        <option value="">Select Status</option>
        <option value="Pending For Approval">Pending For Approval</option>
        <option value="Approved">Approved</option>
        <option value="Rejected">Rejected</option>
        <option value="Completed by Sales">Completed by Sales</option>
    </select>
</div>

            <div class="form-group mb-2">
              <label for="fixture">Fixture No</label>
              <input type="text" class="form-control" id="fixture" name="fixture">
            </div>

            <div class="form-group mb-2">
              <label for="noofmeet">No Of Meet</label>
              <input type="text" class="form-control" id="noofmeet" name="noofmeet">
            </div>

          
            <div class="form-group mb-2">
              <label for="noofparts">No Of Parts</label>
              <input type="text" class="form-control" id="noofparts" name="noofparts">
            </div>

            <div class="form-group mb-2">
              <label for="revision">Revision No</label>
              <input type="number" class="form-control" id="revision" name="revision">
            </div>

            <div class="form-group mb-2">
              <label for="custVenderCode">Customer Vender Code</label>
              <input type="text" class="form-control" id="custVenderCode" name="custVenderCode">
            </div>

<div class="form-group mb-2">
    <label for="hsn">HSN/SAC Code</label>
    <select id="hsn" name="hsn" class="form-control">
        <option value="">Select HSN Code</option>
        {% for h in hsn_codes %}
            <option value="{{ h.code }}">{{ h.code }}</option>
        {% endfor %}
    </select>
</div>

            <div class="form-group mb-2">
              <label for="costingmethod">Costing Method</label>
              <input type="text" class="form-control" id="costingmethod" name="costingmethod">
            </div>

            <div class="form-group mb-2">
              <label for="inventory">Inventory Posting Group</label>
              <input type="text" class="form-control" id="inventory" name="inventory">
            </div>

            <div class="form-group mb-2">
              <label for="priceprofit">Price Profit Calculation</label>
              <input type="text" class="form-control" id="priceprofit" name="priceprofit">
            </div>

            <div class="form-group mb-2">
              <label for="lastModifiedDate">Last Modified Date</label>
              <input type="Date" class="form-control" id="lastModifiedDate" name="lastModifiedDate">
            </div>

          </div>

          <!-- RIGHT COLUMN -->
          <div class="col-md-4">

            <div class="form-group mb-2">
              <label for="genpro">Gen Prod Posting Group</label>
              <input type="text" class="form-control" id="genpro" name="genpro">
            </div>

            <div class="form-group mb-2">
              <label for="replenishment">Replenishment System</label>
              <input type="text" class="form-control" id="replenishment" name="replenishment">
            </div>
            
            <div class="form-group mb-2">
              <label for="qc">QC Applicable</label>
              <input type="text" class="form-control" id="qc" name="qc">
            </div>

            <div class="form-group mb-2">
              <label for="manu">Manufacturing Policy</label>
              <input type="text" class="form-control" id="manu" name="manu">
            </div>

            <div class="form-group mb-2">
              <label for="assembly">Assembly Policy</label>
              <input type="text" class="form-control" id="assembly" name="assembly">
            </div>

            <div class="form-group mb-2">
              <label for="reordering">Reordering Policy</label>
              <input type="text" class="form-control" id="reordering" name="reordering">
            </div>

            <div class="form-group mb-2">
              <label for="inventoryinclude">Include Inventory</label>
              <input type="text" class="form-control" id="inventoryinclude" name="inventoryinclude">
            </div>
            <div class="form-group mb-2">
              <label for="gst">GST Credit</label>
              <input type="text" class="form-control" id="gst" name="gst">
            </div>
            <div class="form-group mb-2">
              <label for="flushing">Flushing Method</label>
              <input type="text" class="form-control" id="flushing" name="flushing">
            </div>

            <div class="form-group mb-2">
              <label for="template_applied">Template Applied</label>
              <input type="text" class="form-control" id="template_applied" name="template_applied">
            </div>

            <div class="form-group mb-2">
              <label for="rounding">Rounding Precision</label>
              <input type="text" class="form-control" id="rounding" name="rounding">
            </div>

            <div class="form-group mb-2">
              <label for="gstgroup">GST Group Code</label>
              <input type="text" class="form-control" id="gstgroup" name="gstgroup">
            </div>

          </div>
      </div>
      </div>

      <div class="card-footer text-right">
        <button type="submit" class="btn btn-primary">Add</button>
        <button type="button" class="btn btn-warning">Update</button>
        <button type="button" class="btn btn-info">ECN Request</button>
        <button type="button" class="btn btn-danger">Delete</button>
        <button type="button" class="btn btn-success">Email Send</button>
      </div>
      <a href="/opportunity_creation/?customer_id={{ selected_customer_id }}&name={{ selected_name }}" class="btn btn-primary">
    Go to Opportunity
</a>
    </form>
  </div>
</div>

<script>
document.getElementById('btn-back')?.addEventListener('click', function() {
    window.history.back();
});
// 1. Template Data Fetch (Manual Change)
document.getElementById("templatename").addEventListener("change", function() {
    const template = this.value;
    if (!template) return;

    fetch(`/get_template_data/?template_name=${template}`)
    .then(res => res.json())
    .then(data => {
        // Mapping template fields
        const templateMap = {
            "item_category_code": data.item_category_code,
            "costingmethod": data.costing_method,
            "inventory": data.inventory_posting_group,
            "priceprofit": data.price_profit_calculation,
            "genpro": data.gen_prod_posting_group,
            "replenishment": data.replenishment_system,
            "qc": data.qc_applicable,
            "manu": data.manufacturing_policy,
            "assembly": data.assembly_policy,
            "reordering": data.reordering_policy,
            "inventoryinclude": data.include_inventory,
            "gst": data.gst_credit,
            "flushing": data.flushing_method,
            "template_applied": data.template_applied,
            "rounding": data.rounding_precision,
            "gstgroup": data.gst_group_code
        };

        for (const [id, value] of Object.entries(templateMap)) {
            const el = document.getElementById(id);
            if (el) el.value = value || "";
        }
    });
});

document.addEventListener("DOMContentLoaded", function () {
    const sItemEl = document.getElementById("s_item");
    if (!sItemEl) return;

    sItemEl.addEventListener("change", function () {
        const itemNo = this.value;
        const customerIdEl = document.getElementById("customer_id");
        const customerId = customerIdEl ? customerIdEl.value : "";

        if (!itemNo) return;

        fetch(`/get_item_details/?item_no=${encodeURIComponent(itemNo)}&customer_id=${encodeURIComponent(customerId)}`)
            .then(res => {
                if (!res.ok) {
                    return res.text().then(text => {
                        throw new Error(`HTTP ${res.status}: ${text}`);
                    });
                }
                return res.json();
            })
            .then(data => {
                console.log("Fetched item details:", data);

                // ✅ FIX DATE FORMAT
                let formattedDate = data.lastModifiedDate || "";
                if (formattedDate && formattedDate.includes("-")) {
                    let parts = formattedDate.split("-");
                    // if DD-MM-YYYY → convert to YYYY-MM-DD
                    if (parts[0].length === 2) {
                        formattedDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
                    }
                }

                const fieldMap = {
                    "no": data.no,
                    "description": data.description,
                    "base_unit_of_measure": data.base_unit_of_measure,
                    "shelf_no": data.shelf_no,
                    "cell": data.cell,
                    "cell_type": data.cell_type,
                    "item_category_code": data.item_category_code,
                    "product_group_code": data.product_group_code,
                    "status": data.status,
                    "fixture": data.fixture,
                    "noofparts": data.noofparts,
                    "noofmeet": data.noofmeet,
                    "revision": data.revision,
                    "custVenderCode": data.custVenderCode,
                    "hsn": data.hsn,
                    "lastModifiedDate": formattedDate
                };

                for (const [id, value] of Object.entries(fieldMap)) {
                    const el = document.getElementById(id);
                    if (!el) continue;

                    if (el.tagName.toLowerCase() === "select") {

                        // 1. Try direct match
                        el.value = value || "";

                        // 2. If failed → try case-insensitive match
                        if (el.value === "" && value) {
                            const targetVal = String(value).trim().toLowerCase();
                            let matched = false;

                            for (let i = 0; i < el.options.length; i++) {
                                if (el.options[i].value.trim().toLowerCase() === targetVal) {
                                    el.selectedIndex = i;
                                    matched = true;
                                    break;
                                }
                            }

                            // 3. Log warning if no match
                            if (!matched) {
                                console.warn(`Dropdown mismatch: Could not find an option for "${value}" in #${id}`);
                            }
                        }

                    } else {
                        // Input / text / date
                        el.value = value || "";
                    }
                }
            })
            .catch(err => {
                console.error("Error fetching item details:", err);
            });
    });
});
</script>
{% endblock %}
