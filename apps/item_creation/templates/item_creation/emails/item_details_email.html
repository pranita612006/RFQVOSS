<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Item Details</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f6f8fa; padding: 24px;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
        <tr>
            <td align="center">
                <table role="presentation" width="700" cellspacing="0" cellpadding="0" border="0" style="background-color: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden;">
                    <tr>
                        <td style="background-color: #0d6efd; color: #ffffff; padding: 16px 20px; font-size: 20px; font-weight: bold;">
                            Item Details
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 20px;">
                            <p style="margin-top: 0; margin-bottom: 16px; color: #111827;">
                                Hello,<br>
                                Please find the item details below:
                            </p>
                            <table width="100%" cellspacing="0" cellpadding="0" border="0" style="border-collapse: collapse;">
                                <thead>
                                    <tr>
                                        <th align="left" style="padding: 10px; border: 1px solid #d1d5db; background-color: #f3f4f6; width: 40%;">Field</th>
                                        <th align="left" style="padding: 10px; border: 1px solid #d1d5db; background-color: #f3f4f6;">Value</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for key, value in item_details.items %}
                                    <tr>
                                        <td style="padding: 10px; border: 1px solid #d1d5db; font-weight: 600; color: #111827;">{{ key }}</td>
                                        <td style="padding: 10px; border: 1px solid #d1d5db; color: #374151;">{{ value|default:"-" }}</td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                            <p style="margin-bottom: 0; margin-top: 16px; color: #6b7280; font-size: 12px;">
                                This is an automated email from the RFQ system.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
