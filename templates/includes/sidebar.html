{% load i18n static admin_adminlte %}

<aside class="main-sidebar sidebar-dark-primary elevation-4">
  <a href="/" class="brand-link">
    <img src="{% static 'dist/img/AdminLTELogo.png' %}" 
         alt="FlowNexis Logo" 
         class="brand-image img-circle elevation-3"
         style="opacity: .8">
    <span class="brand-text font-weight-light">FlowNexis</span>
  </a>

  <div class="sidebar">

    <!-- USER PANEL -->
    <div class="user-panel mt-3 pb-3 mb-3 d-flex">
      <div class="image">
        <img src="{% static 'dist/img/user2-160x160.jpg' %}" 
             class="img-circle elevation-2" 
             alt="User Image">
      </div>

      <div class="info">
        {% if request.user.is_authenticated %}
          <a href="#" class="d-block">
            {{ request.user.get_full_name|default:request.user.username }}
          </a>
        {% else %}
          <a href="#" class="d-block">Guest</a>
        {% endif %}
      </div>
    </div>

    <!-- SEARCH -->
    <div class="form-inline">
      <div class="input-group" data-widget="sidebar-search">
        <input class="form-control form-control-sidebar" 
               type="search" 
               placeholder="Search FlowNexis..." 
               aria-label="Search">
        <div class="input-group-append">
          <button class="btn btn-sidebar">
            <i class="fas fa-search fa-fw"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- MENU -->
    <nav class="mt-2">
      {% include 'includes/menu-list.html' %}
    </nav>

  </div>
</aside>
